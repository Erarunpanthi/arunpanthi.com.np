<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydropower-Engineering</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
        }
        .card {
            text-align: center;
            padding: 60px 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            max-width: 500px;
        }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { font-size: 1rem; color: #a8b2d8; margin-bottom: 30px; line-height: 1.6; }
        a {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245,87,108,0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🚧</div>
        <h1>Hydropower-Engineering</h1>
        <p>This page is currently under construction.<br>We're working hard to bring it to you soon!</p>
        <a href="/">⬅ Back to Home</a>
    </div>
</body>
</html>
