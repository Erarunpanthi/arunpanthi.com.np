<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .url-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            font-size: 14px;
            color: #667eea;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .error-icon {
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="icon">🔗</div>
        <h2>Loading...</h2>
        <p>Please wait while we fetch your link</p>
        <div class="loader"></div>
    </div>

    <script>
        const hash = window.location.hash.substring(1);
        const content = document.getElementById('content');
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        if (hash && /^[a-zA-Z0-9]{6}$/.test(hash)) {
            const urls = JSON.parse(localStorage.getItem('urlShortener') || '{}');
            
            if (urls[hash]) {
                // Increment clicks
                urls[hash].clicks = (urls[hash].clicks || 0) + 1;
                localStorage.setItem('urlShortener', JSON.stringify(urls));
                
                const longUrl = urls[hash].longUrl;
                
                content.innerHTML = `
                    <div class="icon">🚀</div>
                    <h2>Redirecting...</h2>
                    <p>Taking you to your destination</p>
                    <div class="url-box">${escapeHtml(longUrl)}</div>
                    <div class="loader"></div>
                `;
                
                setTimeout(() => {
                    window.location.href = longUrl;
                }, 1200);
            } else {
                content.innerHTML = `
                    <div class="icon error-icon">❌</div>
                    <h2>Link Not Found</h2>
                    <p>This short URL doesn't exist or has been deleted.<br>The code <strong>${escapeHtml(hash)}</strong> is not in our database.</p>
                    <a href="/url-shortener/" class="btn">🔗 Create Your Own Short URL</a>
                `;
            }
        } else {
            content.innerHTML = `
                <div class="icon error-icon">⚠️</div>
                <h2>Invalid Short Code</h2>
                <p>The URL format is incorrect. Please check your link.</p>
                <a href="/url-shortener/" class="btn">🔗 Go to URL Shortener</a>
            `;
        }
    </script>
</body>
</html>
