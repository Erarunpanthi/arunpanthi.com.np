<script>
    const hash = window.location.hash.substring(1);
    const content = document.getElementById('content');
    
    const JSONBIN_CONFIG = {
        apiKey: 'YOUR_JSONBIN_API_KEY_HERE',  // Same as in script.js
        binId: 'YOUR_BIN_ID_HERE'              // Same as in script.js
    };
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function loadAndRedirect() {
        if (hash && /^[a-zA-Z0-9]{6}$/.test(hash)) {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_CONFIG.apiKey
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const urlDatabase = data.record || {};
                    
                    if (urlDatabase[hash]) {
                        const longUrl = urlDatabase[hash].longUrl;
                        
                        content.innerHTML = `
                            <div class="icon">🚀</div>
                            <h2>Redirecting...</h2>
                            <p>Taking you to your destination</p>
                            <div class="url-box">${escapeHtml(longUrl)}</div>
                            <div class="loader"></div>
                        `;
                        
                        setTimeout(() => {
                            window.location.href = longUrl;
                        }, 1200);
                    } else {
                        showError();
                    }
                } else {
                    showError();
                }
            } catch (error) {
                console.error('Error:', error);
                showError();
            }
        } else {
            content.innerHTML = `
                <div class="icon error-icon">⚠️</div>
                <h2>Invalid Short Code</h2>
                <p>The URL format is incorrect.</p>
                <a href="/url-shortener/" class="btn">🔗 Create Short URL</a>
            `;
        }
    }
    
    function showError() {
        content.innerHTML = `
            <div class="icon error-icon">❌</div>
            <h2>Link Not Found</h2>
            <p>This short URL doesn't exist.</p>
            <a href="/url-shortener/" class="btn">🔗 Create Your Own</a>
        `;
    }
    
    loadAndRedirect();
</script>
