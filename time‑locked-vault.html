<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10‑minute secure vault · reveal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 30% 10%, #0b1a33, #0a0f1f);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      color: #ffffff;
    }

    .glass-panel {
      background: rgba(15, 25, 45, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      transition: transform 0.2s ease;
      animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #ffffff, #c0d0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 5px rgba(0, 20, 50, 0.6);
    }

    h1 span {
      font-size: 2.2rem;
      filter: drop-shadow(0 4px 6px #00000040);
    }

    .subhead {
      font-size: 1rem;
      font-weight: 400;
      color: #9bb5ff;
      margin-bottom: 2.8rem;
      border-left: 3px solid #3e6bff;
      padding-left: 1.2rem;
      background: linear-gradient(90deg, rgba(62, 107, 255, 0.2), transparent);
    }

    /* Countdown circle (modern ring) */
    .countdown-wrapper {
      display: flex;
      justify-content: center;
      margin: 1.5rem 0 2.5rem;
    }

    .timer-ring {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer-ring svg {
      position: absolute;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-ring circle {
      fill: none;
      stroke-width: 6px;
      stroke-linecap: round;
      stroke-dasharray: 565.48; /* 2 * pi * 90 ≈ 565.48 */
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-ring .bg-circle {
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 6px;
    }

    .timer-ring .progress-circle {
      stroke: url(#gradient);
      filter: drop-shadow(0 0 8px #3e6bff);
    }

    .timer-text {
      position: relative;
      z-index: 5;
      font-size: 3.5rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #f0f4ff, #bfd6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px #3e6bff;
      line-height: 1;
    }

    .timer-label {
      text-align: center;
      margin-top: -1rem;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #9bb5ff80;
    }

    /* Password reveal box */
    .vault-section {
      margin-top: 2rem;
    }

    .password-box {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2rem;
      padding: 1.6rem 1.8rem;
      font-family: 'Fira Mono', 'Cascadia Code', 'Courier New', monospace;
      font-size: 1.7rem;
      font-weight: 500;
      letter-spacing: 1px;
      word-break: break-all;
      text-align: center;
      box-shadow: 0 15px 30px -10px #00000080, 0 0 0 1px #3e6bff inset;
      backdrop-filter: blur(8px);
      display: none;
      color: #ffffff;
      text-shadow: 0 0 8px cyan;
      animation: glowPulse 2s infinite alternate;
      margin-bottom: 2rem;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 15px 30px -10px #000, 0 0 0 1px #3e6bff, 0 0 10px #3e6bff; }
      100% { box-shadow: 0 15px 30px -10px #000, 0 0 0 2px #6f9eff, 0 0 25px #3e6bff; }
    }

    .copy-btn {
      background: linear-gradient(145deg, #1f3a7a, #122956);
      border: 1px solid #6f9eff;
      color: white;
      font-size: 1.3rem;
      font-weight: 500;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      cursor: pointer;
      width: fit-content;
      margin: 0 auto 1.5rem;
      display: none;
      align-items: center;
      gap: 12px;
      box-shadow: 0 12px 25px -8px #000c33, 0 0 0 1px #a0c0ff inset;
      transition: all 0.2s ease;
      backdrop-filter: blur(5px);
    }

    .copy-btn:hover {
      background: linear-gradient(145deg, #2a4a9e, #1a3470);
      box-shadow: 0 18px 30px -8px #000, 0 0 0 2px #bfd6ff inset;
      transform: scale(1.02);
      border-color: white;
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    .copy-btn i {
      font-size: 1.5rem;
      filter: drop-shadow(0 2px 3px black);
    }

    .footer-note {
      font-size: 0.95rem;
      color: #96abdd;
      background: rgba(0, 5, 20, 0.4);
      padding: 0.9rem 1.8rem;
      border-radius: 60px;
      text-align: center;
      border: 1px dashed #5f7bbf;
      margin-top: 2rem;
      backdrop-filter: blur(4px);
    }

    .footer-note strong {
      color: white;
      font-weight: 600;
      background: #1e3266;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      margin-left: 6px;
    }

    /* utility */
    .hidden {
      display: none;
    }

    .flex-center {
      display: flex;
      justify-content: center;
    }

    /* inline SVG gradient */
    .timer-ring svg defs linearGradient stop {
      transition: stop-color 0.2s;
    }

    /* modal styling (dark theme) */
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 9998;
      display: none;
    }
    .modal-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a2645;
      padding: 25px 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 1px #3e6bff inset;
      z-index: 9999;
      text-align: center;
      display: none;
      color: white;
      border: 1px solid #5f7bbf;
    }
    .modal-card h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      -webkit-text-fill-color: white;
      background: none;
      text-shadow: none;
      color: #ffaa5e;
    }
    .modal-card p {
      font-size: 1rem;
      margin-bottom: 20px;
      color: #cfd9ff;
    }
    .modal-card .close-btn {
      background: #3e6bff;
      color: white;
      border: none;
      padding: 8px 25px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 5px 15px #00000040;
    }
    .modal-card .close-btn:hover {
      background: #5f7bff;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
    <div id="container-d950250f5a43c6c3f4942d50c5cb9461"></div>
  <div class="glass-panel">
    <h1><span>🔐</span> time‑locked vault</h1>
    <div class="subhead">Your access code will appear when the ring completes · exactly 10 minutes</div>

    <div class="countdown-wrapper">
      <div class="timer-ring">
        <svg viewBox="0 0 200 200">
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#5f9eff" />
              <stop offset="100%" stop-color="#bf7aff" />
            </linearGradient>
          </defs>
          <circle class="bg-circle" cx="100" cy="100" r="90"></circle>
          <circle class="progress-circle" cx="100" cy="100" r="90" stroke-dashoffset="0" id="progressRing"></circle>
        </svg>
        <div class="timer-text" id="countdown">10:00</div>
      </div>
    </div>
    <div class="timer-label">time remaining</div>

    <div class="vault-section">
      <div class="password-box" id="password">X9!aT7#qLm2$VpZr4@wYc8^BdF6*GhJk0+NsQeR1%Ux</div>
      <div class="flex-center">
        <button class="copy-btn" id="copyBtn"><i>📋</i> copy & restart 10 min</button>
      </div>
    </div>

    <div class="footer-note">⏳ copy = instant refresh · timer resets back to 10 minutes <strong>vault reload</strong></div>
  </div>

  <script>
    (function() {
      // ---------- Timer variables ----------
      let timeLeft = 600;               // current seconds left
      let totalTime = 600;               // maximum time (changes to 1800 on punishment)
      const PUNISH_TIME = 1800;           // 30 minutes

      const countdownEl = document.getElementById('countdown');
      const passwordEl = document.getElementById('password');
      const copyBtn = document.getElementById('copyBtn');
      const progressRing = document.getElementById('progressRing');

      const circumference = 2 * Math.PI * 90; // 565.48...
      progressRing.style.strokeDasharray = circumference;

      function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        countdownEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

        const progress = timeLeft / totalTime;
        const dashOffset = circumference * (1 - progress);
        progressRing.style.strokeDashoffset = dashOffset;
      }

      function tick() {
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          document.querySelector('.countdown-wrapper').style.display = 'none';
          document.querySelector('.timer-label').style.display = 'none';
          passwordEl.style.display = 'block';
          copyBtn.style.display = 'inline-flex';
          return;
        }
        updateDisplay();
        timeLeft--;
      }

      updateDisplay();
      let timerInterval = setInterval(tick, 1000);

      // ---------- Copy button (works only after reveal) ----------
      copyBtn.addEventListener('click', () => {
        const passwordText = passwordEl.textContent;
        navigator.clipboard.writeText(passwordText).then(() => {
          copyBtn.textContent = '✓ copied! reloading...';
          copyBtn.style.background = '#1f5f3a';
          copyBtn.disabled = true;
          setTimeout(() => location.reload(), 300);
        }).catch(() => {
          alert('Clipboard error, but page will reload anyway.');
          location.reload();
        });
      });

      // ---------- Punishment function ----------
      function applyPunishment(actionMessage) {
        if (timeLeft > 0) {   // only punish if timer still running
          timeLeft = PUNISH_TIME;
          totalTime = PUNISH_TIME;
          updateDisplay();
          showModal('⏰ Time Increased!', `You tried to ${actionMessage}. Timer is now 30 minutes.`);
        } else {
          // If already revealed, just show a warning without punishment
          showModal('Action Blocked', `You cannot ${actionMessage} after the password is revealed.`);
        }
      }

      // ---------- Modal creation ----------
      function createModal() {
        const backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop';
        document.body.appendChild(backdrop);

        const modal = document.createElement('div');
        modal.className = 'modal-card';
        modal.innerHTML = `
          <h1 id="modal-title">Action Blocked</h1>
          <p id="modal-message">This action is not allowed on this page.</p>
          <button class="close-btn" id="modal-close">Close</button>
        `;
        document.body.appendChild(modal);

        document.getElementById('modal-close').onclick = () => {
          backdrop.style.display = 'none';
          modal.style.display = 'none';
        };
      }
      createModal();

      function showModal(title, message) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-message').textContent = message;
        document.querySelector('.modal-backdrop').style.display = 'block';
        document.querySelector('.modal-card').style.display = 'block';
      }

      // ---------- Blocking event listeners with punishment ----------
      document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        applyPunishment('right-click');
      });

      document.addEventListener('selectstart', (e) => {
        e.preventDefault();
        applyPunishment('select text');
      });

      document.addEventListener('copy', (e) => {
        e.preventDefault();
        applyPunishment('copy content');
      });

      document.addEventListener('dragstart', (e) => {
        e.preventDefault();
        applyPunishment('drag and drop');
      });

      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'p') {
          e.preventDefault();
          applyPunishment('print the page');
        } else if (e.ctrlKey && e.shiftKey && e.key === 'i') {
          e.preventDefault();
          applyPunishment('open developer tools');
        } else if (e.ctrlKey && e.key === 'u') {
          e.preventDefault();
          applyPunishment('view source');
        } else if (e.ctrlKey && e.key === 's') {
          e.preventDefault();
          applyPunishment('save the page');
        } else if (e.key === 'F12') {
          e.preventDefault();
          applyPunishment('open developer tools');
        }
        // PrintScreen and window blur handlers removed as requested
      });

      // Optional: pulse effect
      setInterval(() => {
        if (timeLeft > 0) {
          progressRing.style.filter = 'drop-shadow(0 0 12px #6f9eff)';
          setTimeout(() => progressRing.style.filter = 'drop-shadow(0 0 5px #3e6bff)', 200);
        }
      }, 1200);
    })();
  </script>
    <script src="js/layout.js"></script>
<script src="js/hide-links.js"></script>
</body>
</html>
