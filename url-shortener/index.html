<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ Image URL Shortener</h1>
            <p>Convert long image URLs to short, shareable links</p>
        </div>

        <div class="shortener-box">
            <div class="input-section">
                <input 
                    type="text" 
                    id="longUrl" 
                    placeholder="Paste your long image URL here..."
                    autocomplete="off"
                >
                <button id="shortenBtn" onclick="shortenUrl()">
                    <span id="btnText">Shorten URL</span>
                    <span id="btnLoader" class="loader hidden"></span>
                </button>
            </div>

            <div id="result" class="result hidden">
                <div class="result-content">
                    <label>Your shortened URL:</label>
                    <div class="url-display">
                        <input type="text" id="shortUrl" readonly>
                        <button onclick="copyUrl()" class="copy-btn">
                            <span id="copyText">Copy</span>
                        </button>
                    </div>
                    <div class="preview">
                        <img id="previewImg" src="" alt="Image preview">
                    </div>
                </div>
            </div>

            <div id="error" class="error hidden"></div>
        </div>

        <div class="features">
            <div class="feature">
                <span class="icon">⚡</span>
                <h3>Fast & Easy</h3>
                <p>Shorten URLs instantly</p>
            </div>
            <div class="feature">
                <span class="icon">🔒</span>
                <h3>Secure</h3>
                <p>Your data is safe</p>
            </div>
            <div class="feature">
                <span class="icon">📊</span>
                <h3>Track Links</h3>
                <p>Monitor your URLs</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
